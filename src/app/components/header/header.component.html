   <header
        class="fixed w-full top-0 z-50 bg-surface-light/90 dark:bg-surface-dark/90 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div #headerBar class="flex justify-between items-center h-20">
                <div class="flex-shrink-0 flex items-center">
                    <a class="text-3xl font-bold font-display tracking-tight text-primary dark:text-white flex items-center gap-1"
                        href="#" style="">
                        Travelwith<span class="text-secondary" style="">ev</span><span class="text-tertiary"
                            style="">.</span>com
                    </a>
                </div>
                <nav class="flex space-x-4 xl:space-x-8" [class.invisible]="compact" [class.pointer-events-none]="compact" [class.absolute]="compact">
                    <a class="text-heading-light dark:text-heading-dark hover:text-primary dark:hover:text-secondary font-medium transition-colors text-sm xl:text-base whitespace-nowrap"
                        href="#" style="">Home</a>
                    <a class="text-heading-light dark:text-heading-dark hover:text-primary dark:hover:text-secondary font-medium transition-colors text-sm xl:text-base whitespace-nowrap"
                        href="#vehicles" style="">Vehicles</a>
                    <a class="text-heading-light dark:text-heading-dark hover:text-primary dark:hover:text-secondary font-medium transition-colors text-sm xl:text-base whitespace-nowrap"
                        routerLink="/charging-stations" style="">Charging Network</a>
                    <a class="text-heading-light dark:text-heading-dark hover:text-primary dark:hover:text-secondary font-medium transition-colors text-sm xl:text-base whitespace-nowrap"
                        href="#about" style="">About Us</a>
                </nav>
                <div class="flex items-center space-x-3 xl:space-x-4" [class.invisible]="compact" [class.pointer-events-none]="compact" [class.absolute]="compact">
                    <!-- <button
                        class="p-2 rounded-full text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
                        id="theme-toggle" style="" (click)="toggleTheme()">
                        <span class="material-icons dark:hidden" style="">dark_mode</span>
                        <span class="material-icons hidden dark:block" style="">light_mode</span>
                    </button> -->
                    <ng-container *ngIf="authService.isLoggedIn(); else notLoggedIn">
                        <a class="text-heading-light dark:text-heading-dark font-medium hover:text-primary transition-colors text-sm xl:text-base whitespace-nowrap"
                            routerLink="/dashboard">Dashboard</a>
                        <button type="button" (click)="logout()"
                            class="bg-rose-500 hover:bg-rose-600 text-white px-4 xl:px-6 py-2.5 rounded-full font-medium transition-colors shadow-lg shadow-rose-500/30 text-sm xl:text-base whitespace-nowrap">
                            Logout
                        </button>
                    </ng-container>
                    <ng-template #notLoggedIn>
                        <a class="text-heading-light dark:text-heading-dark font-medium hover:text-primary transition-colors text-sm xl:text-base whitespace-nowrap"
                            routerLink="/login">Log In</a>
                        <a class="bg-primary hover:bg-primary/90 text-white px-4 xl:px-6 py-2.5 rounded-full font-medium transition-colors shadow-lg shadow-primary/30 text-sm xl:text-base whitespace-nowrap"
                            routerLink="/signup">Sign Up</a>
                    </ng-template>
                </div>
                <div class="flex items-center space-x-2" [class.hidden]="!compact">
                    <ng-container *ngIf="authService.isLoggedIn(); else mobileNotLoggedIn">
                        <a class="text-heading-light dark:text-heading-dark font-medium hover:text-primary transition-colors px-2 py-2"
                            routerLink="/dashboard" (click)="closeMobileMenu()">Dashboard</a>
                        <button type="button" (click)="logout()"
                            class="text-rose-500 hover:text-rose-600 font-medium transition-colors px-2 py-2">
                            Logout
                        </button>
                    </ng-container>
                    <ng-template #mobileNotLoggedIn>
                        <button class="text-gray-500 hover:text-gray-900 focus:outline-none p-2" (click)="toggleMobileMenu()">
                            <span class="material-icons" *ngIf="!mobileMenuOpen">menu</span>
                            <span class="material-icons" *ngIf="mobileMenuOpen">close</span>
                        </button>
                    </ng-template>
                </div>
            </div>
        </div>

        <!-- Mobile Menu Panel -->
        <div *ngIf="mobileMenuOpen && compact" class="border-t border-gray-200 dark:border-gray-800 bg-surface-light/95 dark:bg-surface-dark/95 backdrop-blur-md">
            <div class="px-4 py-4 space-y-2">
                <a class="block rounded-lg px-3 py-2.5 text-base font-medium text-heading-light dark:text-heading-dark hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
                    href="#" (click)="closeMobileMenu()">Home</a>
                <a class="block rounded-lg px-3 py-2.5 text-base font-medium text-heading-light dark:text-heading-dark hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
                    href="#vehicles" (click)="closeMobileMenu()">Vehicles</a>
                <a class="block rounded-lg px-3 py-2.5 text-base font-medium text-heading-light dark:text-heading-dark hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
                    routerLink="/charging-stations" (click)="closeMobileMenu()">Charging Network</a>
                <a class="block rounded-lg px-3 py-2.5 text-base font-medium text-heading-light dark:text-heading-dark hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
                    href="#about" (click)="closeMobileMenu()">About Us</a>
                <div class="border-t border-gray-200 dark:border-gray-700 pt-3 mt-3 flex flex-col gap-2">
                    <a class="block rounded-lg px-3 py-2.5 text-base font-medium text-heading-light dark:text-heading-dark hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
                        routerLink="/login" (click)="closeMobileMenu()">Log In</a>
                    <a class="block rounded-full bg-primary hover:bg-primary/90 text-white text-center px-6 py-2.5 font-medium transition-colors shadow-lg shadow-primary/30"
                        routerLink="/signup" (click)="closeMobileMenu()">Sign Up</a>
                </div>
            </div>
        </div>
    </header>
