<div class="space-y-4 lg:grid lg:grid-cols-3 lg:gap-6 lg:space-y-0">
  <!-- Balance Card -->
  <div class="rounded-2xl bg-gradient-to-br from-slate-900 to-slate-800 p-5 text-white shadow-lg lg:col-span-1 lg:self-start">
    <p class="text-xs font-bold uppercase tracking-widest text-slate-400">Wallet Balance</p>
    <p class="mt-2 text-4xl font-black">Rs {{ balance | number }}</p>

    <div class="mt-5 grid grid-cols-2 gap-3">
      <div class="rounded-xl bg-white/10 p-3">
        <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Charge Credits</p>
        <p class="mt-1 text-lg font-bold text-cyan-300">{{ chargeCredits }} kWh</p>
      </div>
      <div class="rounded-xl bg-white/10 p-3">
        <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400">This Month</p>
        <p class="mt-1 text-lg font-bold text-emerald-300">Rs 0</p>
      </div>
    </div>

    <!-- Quick Actions (inside balance card on desktop) -->
    <div class="mt-5 grid grid-cols-2 gap-3">
      <button class="flex flex-col items-center gap-2 rounded-xl bg-white/10 p-3 transition hover:bg-white/20">
        <span class="material-icons text-lg text-emerald-300">add</span>
        <span class="text-xs font-bold">Top Up</span>
      </button>
      <button class="flex flex-col items-center gap-2 rounded-xl bg-white/10 p-3 transition hover:bg-white/20">
        <span class="material-icons text-lg text-violet-300">receipt_long</span>
        <span class="text-xs font-bold">Invoices</span>
      </button>
    </div>
  </div>

  <!-- Transactions -->
  <div class="lg:col-span-2">
    <h4 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-3">Recent Transactions</h4>

    <div *ngIf="isLoading" class="flex items-center justify-center py-12">
      <span class="material-icons animate-spin text-3xl text-primary">sync</span>
    </div>

    <div *ngIf="!isLoading" class="space-y-2">
      <div *ngFor="let tx of transactions"
        class="flex items-center gap-3 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
        <span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl"
          [ngClass]="tx.type === 'credit' ? 'bg-emerald-100 text-emerald-600' : 'bg-red-100 text-red-500'">
          <span class="material-icons text-lg">{{ tx.icon }}</span>
        </span>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-bold text-slate-900 truncate">{{ tx.title }}</p>
          <p class="text-xs text-slate-400">{{ tx.date }}</p>
        </div>
        <p class="shrink-0 text-sm font-bold"
          [ngClass]="tx.type === 'credit' ? 'text-emerald-600' : 'text-red-500'">
          {{ tx.type === 'credit' ? '+' : '-' }} Rs {{ tx.amount | number }}
        </p>
      </div>

      <!-- Empty State -->
      <div *ngIf="transactions.length === 0" class="py-12 text-center">
        <span class="material-icons text-5xl text-slate-200">account_balance_wallet</span>
        <p class="mt-3 text-sm font-medium text-slate-400">No transactions yet</p>
      </div>
    </div>
  </div>
</div>
