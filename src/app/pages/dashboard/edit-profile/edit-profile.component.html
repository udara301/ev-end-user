<div class="space-y-5">
  <!-- Header -->
  <div class="flex items-center gap-3">
    <button (click)="goBack()"
      class="flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 bg-white shadow-sm transition hover:bg-slate-50">
      <span class="material-icons text-lg text-slate-600">arrow_back</span>
    </button>
    <div>
      <h2 class="text-lg font-bold text-slate-900 lg:text-xl">Edit Profile</h2>
      <p class="text-xs text-slate-500">Update your personal information</p>
    </div>
  </div>

  <!-- Alerts -->
  <div *ngIf="successMessage"
    class="flex items-center gap-2 rounded-xl bg-emerald-50 border border-emerald-200 p-3 text-sm font-medium text-emerald-700">
    <span class="material-icons text-base">check_circle</span>
    {{ successMessage }}
  </div>
  <div *ngIf="errorMessage"
    class="flex items-center gap-2 rounded-xl bg-red-50 border border-red-200 p-3 text-sm font-medium text-red-600">
    <span class="material-icons text-base">error</span>
    {{ errorMessage }}
  </div>

  <!-- Form -->
  <form (ngSubmit)="onSubmit()" class="space-y-5">
    <!-- Residency Toggle -->
    <div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm lg:p-5">
      <label class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-3 block">Residency</label>
      <div class="flex gap-3">
        <button type="button" (click)="form.is_local = true"
          class="flex-1 rounded-xl py-2.5 text-sm font-semibold transition"
          [ngClass]="form.is_local ? 'bg-primary text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'">
          Local
        </button>
        <button type="button" (click)="form.is_local = false"
          class="flex-1 rounded-xl py-2.5 text-sm font-semibold transition"
          [ngClass]="!form.is_local ? 'bg-primary text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'">
          Foreign
        </button>
      </div>
    </div>

    <!-- Personal Info -->
    <div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm lg:p-5">
      <label class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-4 block">Personal Information</label>
      <div class="space-y-4 lg:grid lg:grid-cols-2 lg:gap-4 lg:space-y-0">
        <!-- Name -->
        <div>
          <label for="name" class="block text-xs font-medium text-slate-500 mb-1">Full Name</label>
          <input id="name" type="text" [(ngModel)]="form.name" name="name" required
            class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm text-slate-900 placeholder-slate-400 focus:border-primary focus:bg-white focus:outline-none focus:ring-1 focus:ring-primary"
            placeholder="Enter your full name" />
        </div>

        <!-- Phone -->
        <div>
          <label for="phone" class="block text-xs font-medium text-slate-500 mb-1">Phone Number</label>
          <input id="phone" type="tel" [(ngModel)]="form.phone_number" name="phone_number"
            class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm text-slate-900 placeholder-slate-400 focus:border-primary focus:bg-white focus:outline-none focus:ring-1 focus:ring-primary"
            placeholder="07X XXX XXXX" />
        </div>

        <!-- NIC (show if local) -->
        <div *ngIf="form.is_local">
          <label for="nic" class="block text-xs font-medium text-slate-500 mb-1">NIC Number</label>
          <input id="nic" type="text" [(ngModel)]="form.nic" name="nic"
            class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm text-slate-900 placeholder-slate-400 focus:border-primary focus:bg-white focus:outline-none focus:ring-1 focus:ring-primary"
            placeholder="National ID number" />
        </div>

        <!-- Passport (show if foreign) -->
        <div *ngIf="!form.is_local">
          <label for="passport" class="block text-xs font-medium text-slate-500 mb-1">Passport Number</label>
          <input id="passport" type="text" [(ngModel)]="form.passport_number" name="passport_number"
            class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm text-slate-900 placeholder-slate-400 focus:border-primary focus:bg-white focus:outline-none focus:ring-1 focus:ring-primary"
            placeholder="Passport number" />
        </div>

        <!-- Address (full width) -->
        <div class="lg:col-span-2">
          <label for="address" class="block text-xs font-medium text-slate-500 mb-1">Address</label>
          <input id="address" type="text" [(ngModel)]="form.address" name="address"
            class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm text-slate-900 placeholder-slate-400 focus:border-primary focus:bg-white focus:outline-none focus:ring-1 focus:ring-primary"
            placeholder="Your address" />
        </div>
      </div>
    </div>

    <!-- Vehicle Info -->
    <div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm lg:p-5">
      <label class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-4 block">Pesonal Vehicle Information</label>
      <div class="space-y-4 lg:grid lg:grid-cols-2 lg:gap-4 lg:space-y-0">
        <!-- Vehicle Model -->
        <div>
          <label for="vehicle_model" class="block text-xs font-medium text-slate-500 mb-1">Vehicle Model</label>
          <input id="vehicle_model" type="text" [(ngModel)]="form.vehicle_model" name="vehicle_model"
            class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm text-slate-900 placeholder-slate-400 focus:border-primary focus:bg-white focus:outline-none focus:ring-1 focus:ring-primary"
            placeholder="e.g. Tesla Model 3" />
        </div>

        <!-- Vehicle Number -->
        <div>
          <label for="vehicle_number" class="block text-xs font-medium text-slate-500 mb-1">Vehicle Number</label>
          <input id="vehicle_number" type="text" [(ngModel)]="form.vehicle_number" name="vehicle_number"
            class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm text-slate-900 placeholder-slate-400 focus:border-primary focus:bg-white focus:outline-none focus:ring-1 focus:ring-primary"
            placeholder="e.g. ABC-1234" />
        </div>
      </div>
    </div>

    <!-- Submit -->
    <button type="submit" [disabled]="isSaving"
      class="flex w-full items-center justify-center gap-2 rounded-2xl bg-primary py-3.5 text-sm font-bold text-white shadow-lg transition hover:bg-primary/90 disabled:opacity-50 lg:w-auto lg:px-8">
      <span *ngIf="isSaving" class="material-icons animate-spin text-base">sync</span>
      <span *ngIf="!isSaving" class="material-icons text-base">save</span>
      {{ isSaving ? 'Saving...' : 'Save Changes' }}
    </button>
  </form>
</div>
